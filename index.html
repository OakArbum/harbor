<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Harbor</title>
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://api.themoviedb.org" crossorigin />
    <link rel="preconnect" href="https://v3-cinemeta.strem.io" crossorigin />
    <link rel="preconnect" href="https://api.strem.io" crossorigin />
    <link rel="dns-prefetch" href="https://www.omdbapi.com" />
    <link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=sentient@400,500,600,700,401,501,601,701&f[]=switzer@400,500,600,700&f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@400,500,700,800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Vazirmatn:wght@100..900&family=Inter:wght@100..900&family=IBM+Plex+Sans:wght@100..700&family=Plus+Jakarta+Sans:wght@100..800&family=Fredoka:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        background: var(--color-canvas, #0a0a0a);
        color-scheme: dark;
        margin: 0;
        height: 100%;
      }
      #harbor-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 9999;
        pointer-events: none;
      }
      #root[data-startup-hidden] {
        visibility: hidden;
      }
    </style>
    <script>
      (function () {
        try {
          var p = new URLSearchParams(window.location.search);
          if (p.get("harbor-modal") === "1") {
            var s = document.createElement("style");
            s.textContent = "#harbor-boot{display:none !important}";
            document.head.appendChild(s);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="harbor-boot"></div>
    <div id="root" inert data-startup-hidden></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
